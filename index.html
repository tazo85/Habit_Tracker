<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker.work</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Habit Tracker.work</h1><hr>
    <div class="add-row">
      <input id="taskInput" type="text" placeholder="Enter a habit">
      <select id="weekdaySelect">
        <option value="Monday">Monday</option>
        <option value="Tuesday">Tuesday</option>
        <option value="Wednesday">Wednesday</option>
        <option value="Thursday">Thursday</option>
        <option value="Friday">Friday</option>
        <option value="Saturday">Saturday</option>
        <option value="Sunday">Sunday</option>
      </select>
      <button id="addBtn">Add Habit</button>
    </div>
    <hr>

    <div id="weekdayLists" class="weekday-lists">
      <div class="weekday">
        <h2>Monday</h2>
        <ul id="MondayList" class="day-list"></ul>
      </div>
      <div class="weekday">
        <h2>Tuesday</h2>
        <ul id="TuesdayList" class="day-list"></ul>
      </div>
      <div class="weekday">
        <h2>Wednesday</h2>
        <ul id="WednesdayList" class="day-list"></ul>
      </div>
      <div class="weekday">
        <h2>Thursday</h2>
        <ul id="ThursdayList" class="day-list"></ul>
      </div>
      <div class="weekday">
        <h2>Friday</h2>
        <ul id="FridayList" class="day-list"></ul>
      </div>
      <div class="weekday">
        <h2>Saturday</h2>
        <ul id="SaturdayList" class="day-list"></ul>
      </div>
      <div class="weekday">
        <h2>Sunday</h2>
        <ul id="SundayList" class="day-list"></ul>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
